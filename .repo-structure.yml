# Explicit allowlist of every path permitted in this public repo.
# Any tracked file that does not match a pattern below fails CI
# (see .github/workflows/repo-structure.yml).
#
# To add a new allowed path, update this file in the same PR that adds
# the file. Prefer narrow patterns over broad ones: a narrower pattern
# forces the conversation "does this really belong in a public repo?"
#
# Glob syntax is gitignore-style: `*` matches one path component,
# `**` matches any depth, `?` matches a single character.
#
# The principle this enforces: public repos contain ONLY what ships to
# users. Everything else (internal planning, design exploration,
# competitor research, audits) lives in murmurlinux/internal.

allowed:
  # --- Meta: the allowlist and its enforcement machinery ---
  - .gitignore
  - .repo-structure.yml
  - .pre-commit-config.yaml
  - .github/CODEOWNERS
  - .github/scripts/check-repo-structure.py
  - .github/workflows/ci.yml
  - .github/workflows/release.yml
  - .github/workflows/public-hygiene.yml
  - .github/workflows/repo-structure.yml
  - .github/workflows/secret-scan.yml
  - .github/workflows/history-scan.yml

  # --- Community + customer-facing docs ---
  - LICENSE
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - SECURITY.md

  # --- Repo banner (referenced by README) ---
  - .github/banner.png

  # --- Issue + PR templates ---
  - .github/PULL_REQUEST_TEMPLATE.md
  - .github/ISSUE_TEMPLATE/bug_report.md
  - .github/ISSUE_TEMPLATE/config.yml
  - .github/ISSUE_TEMPLATE/feature_request.md

  # --- Root-level build config ---
  - package.json
  - pnpm-lock.yaml
  - tsconfig.json
  - vite.config.ts
  - rust-toolchain.toml

  # --- Tauri multi-window entry HTML ---
  - index.html
  - onboarding.html
  - popup.html
  - settings.html

  # --- Frontend source (SolidJS + TypeScript) ---
  - src/**

  # --- Rust / Tauri source ---
  - src-tauri/**
