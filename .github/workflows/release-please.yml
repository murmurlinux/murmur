name: release-please

# On every push to main:
#   1. release-please-action opens or updates a release PR that bumps every
#      version surface (package.json, src-tauri/Cargo.toml, src-tauri/Cargo.lock,
#      src-tauri/tauri.conf.json, README download URLs) and regenerates
#      CHANGELOG.md from conventional commits since the last release.
#   2. If a release PR is open, we enable auto-merge on it so the release
#      cuts automatically once CI is green. Human approval lives on the
#      feature PRs that fed into main, not here.
#
# When a release is cut here (or when a tag is pushed manually for a
# hotfix), the tag push triggers release.yml, which builds the binaries
# AND dispatches the website-version sync downstream. That keeps a
# single source of truth for "a release happened" and avoids the
# silent-skip seen on v0.3.7 / v0.3.8 when the website lagged because
# the dispatch was previously gated on release-please's own output.
#
# No tag signing (bot-created tags show "Unverified"; users verify the
# Tauri .sig artefact signatures on the release assets, not tag sigs).
# No Telegram hook; GitHub's native email-on-failure covers it.
#
# All outputs from release-please-action flow through env vars before
# reaching any shell command; no direct ${{ }} interpolation in run blocks.

on:
  push:
    branches: [main]
  # Manual re-trigger for recovery scenarios — e.g. when a stuck
  # `autorelease: pending` label on a prior release PR caused the
  # action to abort with "untagged, merged release PRs outstanding"
  # and a fresh evaluation is needed without an actual code commit.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.rp.outputs.pr && fromJson(steps.rp.outputs.pr).number }}
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v1.11.0
        with:
          app-id: ${{ secrets.MURMURLINUX_BOT_APP_ID }}
          private-key: ${{ secrets.MURMURLINUX_BOT_PRIVATE_KEY }}
          owner: murmurlinux
          repositories: murmur

      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      # Self-heal for the "untagged, merged release PRs outstanding"
      # abort path (internal#203). Detects merged release PRs that are
      # still labelled `autorelease: pending`, advances them to
      # `autorelease: tagged`, and creates the missing tag if release.yml
      # never fired. Idempotent and no-op when nothing is stuck.
      - name: Heal stuck release PRs
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: murmurlinux/murmur
        run: |
          set -euo pipefail

          STUCK=$(gh pr list --repo "$REPO" --state merged \
            --search "release main in:title" \
            --json number,mergeCommit,labels \
            --limit 20 \
            --jq '[.[] | select(.labels[]?.name == "autorelease: pending") | {number, sha: .mergeCommit.oid}]')

          COUNT=$(echo "$STUCK" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "No stuck release PRs. Nothing to heal."
            exit 0
          fi

          echo "::warning::Found $COUNT stuck release PR(s) with autorelease: pending — healing."

          echo "$STUCK" | jq -c '.[]' | while read -r entry; do
            PR=$(echo "$entry" | jq -r .number)
            SHA=$(echo "$entry" | jq -r .sha)

            VERSION=$(gh api "repos/$REPO/contents/.release-please-manifest.json?ref=$SHA" \
              --jq '.content' | base64 -d | jq -r '."."')
            TAG="v$VERSION"

            echo "PR #$PR cut version $VERSION at $SHA (tag: $TAG)"

            if gh api "repos/$REPO/git/refs/tags/$TAG" --silent 2>/dev/null; then
              echo "Tag $TAG already exists. Advancing label only."
            else
              echo "Tag $TAG missing. Creating at $SHA."
              gh api -X POST "repos/$REPO/git/refs" \
                -f "ref=refs/tags/$TAG" \
                -f "sha=$SHA" >/dev/null
              echo "::notice::Created missing tag $TAG (release.yml will fire on the push)."
            fi

            gh api -X DELETE "repos/$REPO/issues/$PR/labels/autorelease:%20pending" --silent 2>/dev/null || true
            gh api -X POST "repos/$REPO/issues/$PR/labels" \
              -f "labels[]=autorelease: tagged" --silent >/dev/null

            echo "::notice::Healed PR #$PR (label advanced; tag $TAG ready)."
          done

  auto-merge-release-pr:
    needs: release-please
    if: needs.release-please.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v1.11.0
        with:
          app-id: ${{ secrets.MURMURLINUX_BOT_APP_ID }}
          private-key: ${{ secrets.MURMURLINUX_BOT_PRIVATE_KEY }}
          owner: murmurlinux
          repositories: murmur

      - name: Enable auto-merge on the release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.release-please.outputs.pr_number }}
        run: gh pr merge --auto --squash --repo murmurlinux/murmur "$PR_NUMBER"

