name: release-please

# On every push to main:
#   1. release-please-action opens or updates a release PR that bumps every
#      version surface (package.json, src-tauri/Cargo.toml, src-tauri/Cargo.lock,
#      src-tauri/tauri.conf.json, README download URLs) and regenerates
#      CHANGELOG.md from conventional commits since the last release.
#   2. If a release PR is open, we enable auto-merge on it so the release
#      cuts automatically once CI is green. Human approval lives on the
#      feature PRs that fed into main, not here.
#
# When a release is cut here (or when a tag is pushed manually for a
# hotfix), the tag push triggers release.yml, which builds the binaries
# AND dispatches the website-version sync downstream. That keeps a
# single source of truth for "a release happened" and avoids the
# silent-skip seen on v0.3.7 / v0.3.8 when the website lagged because
# the dispatch was previously gated on release-please's own output.
#
# No tag signing (bot-created tags show "Unverified"; users verify the
# Tauri .sig artefact signatures on the release assets, not tag sigs).
# No Telegram hook; GitHub's native email-on-failure covers it.
#
# All outputs from release-please-action flow through env vars before
# reaching any shell command; no direct ${{ }} interpolation in run blocks.

on:
  push:
    branches: [main]
  # Manual re-trigger for recovery scenarios — e.g. when a stuck
  # `autorelease: pending` label on a prior release PR caused the
  # action to abort with "untagged, merged release PRs outstanding"
  # and a fresh evaluation is needed without an actual code commit.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.rp.outputs.pr && fromJson(steps.rp.outputs.pr).number }}
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v1.11.0
        with:
          app-id: ${{ secrets.MURMURLINUX_BOT_APP_ID }}
          private-key: ${{ secrets.MURMURLINUX_BOT_PRIVATE_KEY }}
          owner: murmurlinux
          repositories: murmur

      - uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.1.3
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  auto-merge-release-pr:
    needs: release-please
    if: needs.release-please.outputs.pr_number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v1.11.0
        with:
          app-id: ${{ secrets.MURMURLINUX_BOT_APP_ID }}
          private-key: ${{ secrets.MURMURLINUX_BOT_PRIVATE_KEY }}
          owner: murmurlinux
          repositories: murmur

      - name: Enable auto-merge on the release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.release-please.outputs.pr_number }}
        run: gh pr merge --auto --squash --repo murmurlinux/murmur "$PR_NUMBER"

