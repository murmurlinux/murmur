name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libclang-dev \
            libvulkan-dev \
            glslc \
            glslang-tools \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            xdotool \
            wtype \
            patchelf \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Murmur ${{ github.ref_name }}"
          releaseBody: "See the [CHANGELOG](https://github.com/murmurlinux/murmur/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  update-apt-repo:
    name: Update APT Repository
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download .deb from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" --repo murmurlinux/murmur --pattern '*.deb' --dir ./debs

      - name: Import GPG signing key
        run: |
          echo "$APT_SIGNING_KEY" | gpg --batch --import
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}

      - name: Get GPG key ID
        id: gpg
        run: |
          KEY_ID=$(gpg --list-keys --keyid-format long dev@murmurlinux.com | grep -oP '(?<=\/)[A-F0-9]{16}' | head -1)
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Setup apt repo with reprepro
        run: |
          sudo apt-get install -y reprepro

          mkdir -p repo/conf
          cat > repo/conf/distributions <<'DISTEOF'
Origin: Murmur Linux
Label: Murmur
Suite: stable
Codename: stable
Architectures: amd64
Components: main
Description: Murmur voice-to-text for Linux
DISTEOF
          echo "SignWith: ${{ steps.gpg.outputs.key_id }}" >> repo/conf/distributions

          for deb in ./debs/*.deb; do
            reprepro -b repo --ignore=missingfield includedeb stable "$deb"
          done

          gpg --armor --export dev@murmurlinux.com > repo/gpg.key

      - name: Deploy to apt repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.APT_DEPLOY_TOKEN }}
          external_repository: murmurlinux/apt
          publish_branch: gh-pages
          publish_dir: ./repo
          keep_files: false
