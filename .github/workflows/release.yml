name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      # Pin ggml CPU instruction-set target. With GGML_NATIVE=ON (the
      # ggml default), the compile picks up -march=native and bakes in
      # whatever extensions the build runner's CPU happens to expose.
      # GitHub Actions runner SKUs vary; some Xeon runners expose ISA
      # extensions that consumer CPUs do not. Setting GGML_NATIVE=OFF on
      # a native-capable host leaves INS_ENB=ON in ggml's CMakeLists, so
      # AVX/AVX2/FMA/F16C/BMI2/SSE4.2 default ON and AVX-512 stays OFF.
      # Target: x86-64-v3 baseline (Haswell 2013+, Zen 1+).
      GGML_NATIVE: "OFF"
      GGML_AVX512: "OFF"
      GGML_AVX512_VBMI: "OFF"
      GGML_AVX512_VNNI: "OFF"
      GGML_AVX512_BF16: "OFF"

    steps:
      - uses: actions/checkout@v4

      - name: Install LunarG Vulkan SDK
        # 22.04 main archive does not package glslc. LunarG (the company
        # that maintains the Khronos Vulkan SDK) publishes their own apt
        # repo for jammy with current glslc + glslangValidator + libs.
        # Standard pattern across every commercial Linux Vulkan-using
        # app shipping to LTS Ubuntu versions. See #143.
        run: |
          wget -qO /tmp/lunarg.asc https://packages.lunarg.com/lunarg-signing-key-pub.asc
          gpg --dearmor < /tmp/lunarg.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.gpg > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libclang-dev \
            libvulkan-dev \
            vulkan-sdk \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            xdotool \
            wtype \
            patchelf \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-22.04-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-22.04-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (signed)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Murmur ${{ github.ref_name }}"
          # releaseBody omitted: release-please populates the release body with
          # the generated CHANGELOG section when it creates the release itself.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

      - name: Verify ISA baseline (no AVX-512 in produced binary)
        # Belt-and-braces: even with GGML_NATIVE=OFF, a future ggml
        # default change or transitively-built C dependency could
        # re-enable instruction-set auto-detection. Fail fast if any
        # AVX-512 instructions reach the binary so the apt-repo job
        # never runs on an unsafe build.
        run: |
          BIN=src-tauri/target/release/murmur
          [ -f "$BIN" ] || { echo "could not locate built murmur binary at $BIN"; exit 1; }
          echo "Scanning $BIN for AVX-512 markers"
          ZMM=$(objdump -d "$BIN" | grep -cE '%zmm|\{%k[0-7]\}' || true)
          echo "AVX-512 instruction count: $ZMM"
          if [ "$ZMM" -ne 0 ]; then
            echo "::error::AVX-512 instructions present ($ZMM refs). Build env must keep GGML_NATIVE=OFF."
            objdump -d "$BIN" | grep -E '%zmm|\{%k[0-7]\}' | head -10
            exit 1
          fi

  update-apt-repo:
    name: Update APT Repository
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download .deb from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" --repo murmurlinux/murmur --pattern '*.deb' --dir ./debs

      - name: Import GPG signing key
        run: |
          echo "$APT_SIGNING_KEY" | gpg --batch --import
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}

      - name: Get GPG key ID
        id: gpg
        run: |
          KEY_ID=$(gpg --list-keys --keyid-format long dev@murmurlinux.com | grep -oP '(?<=\/)[A-F0-9]{16}' | head -1)
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Setup apt repo with reprepro
        run: |
          sudo apt-get install -y reprepro

          mkdir -p repo/conf
          printf 'Origin: Murmur Linux\nLabel: Murmur\nSuite: stable\nCodename: stable\nArchitectures: amd64\nComponents: main\nDescription: Murmur voice-to-text for Linux\nSignWith: %s\n' "${{ steps.gpg.outputs.key_id }}" > repo/conf/distributions

          for deb in ./debs/*.deb; do
            reprepro -b repo --ignore=missingfield includedeb stable "$deb"
          done

          gpg --armor --export dev@murmurlinux.com > repo/gpg.key

      - name: Deploy to apt repo
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          personal_token: ${{ secrets.APT_DEPLOY_TOKEN }}
          external_repository: murmurlinux/apt
          publish_branch: gh-pages
          publish_dir: ./repo
          keep_files: false

  rollback-on-failure:
    name: Rollback release on build failure
    needs: [build-and-release, update-apt-repo]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete release (tag preserved for re-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Check if the release has assets; if so, refuse automatic rollback
          # (users may have already downloaded it).
          ASSETS=$(gh release view "$TAG" --repo murmurlinux/murmur --json assets --jq '.assets | length' 2>/dev/null || echo "missing")
          if [ "$ASSETS" = "missing" ]; then
            echo "Release $TAG not found; nothing to roll back."
          elif [ "$ASSETS" = "0" ]; then
            gh release delete "$TAG" --repo murmurlinux/murmur --yes --cleanup-tag=false
            echo "Rolled back empty release $TAG. Tag preserved; re-trigger release.yml to retry."
          else
            echo "::warning::Release $TAG already has $ASSETS asset(s); refusing automatic rollback. Manual review required."
            exit 1
          fi

