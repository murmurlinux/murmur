name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint, Format, Build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install LunarG Vulkan SDK
        # 22.04 main archive does not package glslc. LunarG (the company
        # that maintains the Khronos Vulkan SDK) publishes their own apt
        # repo for jammy with current glslc + glslangValidator + libs.
        # Standard pattern across every commercial Linux Vulkan-using
        # app shipping to LTS Ubuntu versions. See #143.
        run: |
          wget -qO /tmp/lunarg.asc https://packages.lunarg.com/lunarg-signing-key-pub.asc
          gpg --dearmor < /tmp/lunarg.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.gpg > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libclang-dev \
            libvulkan-dev \
            vulkan-sdk \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            xdotool \
            wtype

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-22.04-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-22.04-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust linting
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Frontend build
        run: pnpm build

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Dependency audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --locked || true
          # Ignored advisories (tracked separately for dep bumps):
          # - RUSTSEC-2026-0097: rand 0.8.5 unsoundness (transitive, tauri).
          cargo audit --ignore RUSTSEC-2026-0097

      # --- Blind property tests (from private test repo) ---
      # Skipped on fork PRs (secrets unavailable) and Dependabot PRs
      # (Dependabot has its own restricted secret scope without TEST_REPO_TOKEN).
      # Push-to-main and regular human PRs still run them.
      - name: Checkout blind tests
        if: ${{ github.event.pull_request.head.repo.fork != true && github.actor != 'dependabot[bot]' }}
        uses: actions/checkout@v4
        with:
          repository: murmurlinux/tests
          token: ${{ secrets.TEST_REPO_TOKEN }}
          path: _tests

      - name: Run Rust property tests
        if: ${{ github.event.pull_request.head.repo.fork != true && github.actor != 'dependabot[bot]' }}
        working-directory: _tests/app/rust
        run: cargo test --release

      - name: Run frontend property tests
        if: ${{ github.event.pull_request.head.repo.fork != true && github.actor != 'dependabot[bot]' }}
        working-directory: _tests/app/frontend
        run: pnpm install --frozen-lockfile && pnpm test
