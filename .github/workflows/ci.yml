name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint, Format, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libclang-dev \
            libvulkan-dev \
            glslc \
            glslang-tools \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            xdotool \
            wtype

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust linting
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Frontend build
        run: pnpm build

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Dependency audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --locked || true
          # RUSTSEC-2026-0097: rand 0.8.5 unsoundness, transitive via tauri
          # html5ever phf_generator. Not exploitable in our usage; ignore
          # pending upstream bump to rand 0.9.
          cargo audit --ignore RUSTSEC-2026-0097

      # --- Blind property tests (from private test repo) ---
      # Skipped on fork PRs where secrets are unavailable
      - name: Checkout blind tests
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        uses: actions/checkout@v4
        with:
          repository: murmurlinux/tests
          token: ${{ secrets.TEST_REPO_TOKEN }}
          path: _tests

      - name: Run Rust property tests
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        working-directory: _tests/app/rust
        run: cargo test --release

      - name: Run frontend property tests
        if: ${{ github.event.pull_request.head.repo.fork != true }}
        working-directory: _tests/app/frontend
        run: pnpm install --frozen-lockfile && pnpm test
